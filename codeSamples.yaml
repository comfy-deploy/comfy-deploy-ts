overlay: 1.0.0
info:
  title: CodeSamples overlay for typescript target
  version: 0.0.0
actions:
  - target: $["paths"]["/deployments"]["get"]
    update:
      "x-codeSamples":
        - "lang": "typescript"
          "label": "get_deployments_deployments_get"
          "source": "import { ComfyDeploy } from \"comfydeploy\";\n\nconst comfyDeploy = new ComfyDeploy({\n  bearer: \"<YOUR_BEARER_TOKEN_HERE>\",\n});\n\nasync function run() {\n  const result = await comfyDeploy.deployments.list({});\n\n  // Handle the result\n  console.log(result);\n}\n\nrun();"
  - target: $["paths"]["/deps"]["post"]
    update:
      "x-codeSamples":
        - "lang": "typescript"
          "label": "convert_to_docker_steps_deps_post"
          "source": "import { ComfyDeploy } from \"comfydeploy\";\n\nconst comfyDeploy = new ComfyDeploy({\n  bearer: \"<YOUR_BEARER_TOKEN_HERE>\",\n});\n\nasync function run() {\n  const result = await comfyDeploy.beta.generateDockerSteps({\n    dockerCommandSteps: \"<value>\",\n  });\n\n  // Handle the result\n  console.log(result);\n}\n\nrun();"
  - target: $["paths"]["/file/upload"]["post"]
    update:
      "x-codeSamples":
        - "lang": "typescript"
          "label": "upload_file_file_upload_post"
          "source": "import { ComfyDeploy } from \"comfydeploy\";\nimport { openAsBlob } from \"node:fs\";\n\nconst comfyDeploy = new ComfyDeploy({\n  bearer: \"<YOUR_BEARER_TOKEN_HERE>\",\n});\n\nasync function run() {\n  const result = await comfyDeploy.file.upload({\n    file: await openAsBlob(\"example.file\"),\n  });\n\n  // Handle the result\n  console.log(result);\n}\n\nrun();"
  - target: $["paths"]["/run/queue"]["post"]
    update:
      "x-codeSamples":
        - "lang": "typescript"
          "label": "create_run_queue_run_queue_post"
          "source": "import { ComfyDeploy } from \"comfydeploy\";\n\nconst comfyDeploy = new ComfyDeploy({\n  bearer: \"<YOUR_BEARER_TOKEN_HERE>\",\n});\n\nasync function run() {\n  const result = await comfyDeploy.run.queue({\n    executionMode: \"async\",\n    inputs: {\n      \"prompt\": \"A beautiful landscape\",\n      \"seed\": 42,\n    },\n    webhook: \"https://example.com/webhook\",\n    webhookIntermediateStatus: true,\n    origin: \"manual\",\n    batchNumber: 5,\n    batchInputParams: {\n      \"input_number\": [\n        1,\n        2,\n        3,\n      ],\n      \"input_text\": [\n        \"apple\",\n        \"banana\",\n        \"cherry\",\n      ],\n    },\n    isNativeRun: true,\n    workflowVersionId: \"3ec31b24-d0d3-4298-9ffa-c74003017b70\",\n  });\n\n  // Handle the result\n  console.log(result);\n}\n\nrun();"
  - target: $["paths"]["/run/stream"]["post"]
    update:
      "x-codeSamples":
        - "lang": "typescript"
          "label": "create_run_stream_run_stream_post"
          "source": "import { ComfyDeploy } from \"comfydeploy\";\n\nconst comfyDeploy = new ComfyDeploy({\n  bearer: \"<YOUR_BEARER_TOKEN_HERE>\",\n});\n\nasync function run() {\n  const result = await comfyDeploy.run.stream({\n    executionMode: \"async\",\n    inputs: {\n      \"prompt\": \"A beautiful landscape\",\n      \"seed\": 42,\n    },\n    webhook: \"https://example.com/webhook\",\n    webhookIntermediateStatus: true,\n    origin: \"manual\",\n    batchNumber: 5,\n    batchInputParams: {\n      \"input_number\": [\n        1,\n        2,\n        3,\n      ],\n      \"input_text\": [\n        \"apple\",\n        \"banana\",\n        \"cherry\",\n      ],\n    },\n    isNativeRun: true,\n    deploymentId: \"41f69f97-08c7-43e9-a00c-844065577d45\",\n  });\n\n  for await (const event of result) {\n    // Handle the event\n    console.log(event);\n  }\n}\n\nrun();"
  - target: $["paths"]["/run/sync"]["post"]
    update:
      "x-codeSamples":
        - "lang": "typescript"
          "label": "create_run_sync_run_sync_post"
          "source": "import { ComfyDeploy } from \"comfydeploy\";\n\nconst comfyDeploy = new ComfyDeploy({\n  bearer: \"<YOUR_BEARER_TOKEN_HERE>\",\n});\n\nasync function run() {\n  const result = await comfyDeploy.run.sync({\n    executionMode: \"async\",\n    inputs: {\n      \"prompt\": \"A beautiful landscape\",\n      \"seed\": 42,\n    },\n    webhook: \"https://example.com/webhook\",\n    webhookIntermediateStatus: true,\n    origin: \"manual\",\n    batchNumber: 5,\n    batchInputParams: {\n      \"input_number\": [\n        1,\n        2,\n        3,\n      ],\n      \"input_text\": [\n        \"apple\",\n        \"banana\",\n        \"cherry\",\n      ],\n    },\n    isNativeRun: true,\n    deploymentId: \"0897be30-8085-4c96-83b5-09c0142ddd3a\",\n  });\n\n  // Handle the result\n  console.log(result);\n}\n\nrun();"
