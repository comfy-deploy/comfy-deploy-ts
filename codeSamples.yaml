        - "lang": "typescript"
          "label": "create_dynamic_session_session_dynamic_post"
          "source": "import { ComfyDeploy } from \"comfydeploy\";\n\nconst comfyDeploy = new ComfyDeploy({\n  bearer: \"<YOUR_BEARER_TOKEN_HERE>\",\n});\n\nasync function run() {\n  const result = await comfyDeploy.beta.createDynamic({\n    machineId: \"<id>\",\n    dependencies: [\n      \"Stability-AI/ComfyUI-SAI_API@1793086\",\n      \"cubiq/ComfyUI_IPAdapter_plus@b188a6c\",\n    ],\n  });\n\n  // Handle the result\n  console.log(result);\n}\n\nrun();"
